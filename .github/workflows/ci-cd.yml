name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # ── Backend checks ──────────────────────────────────────────────
  backend-syntax:
    name: Backend - Syntax & Import Check
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "ci-test-secret-key-minimum-32-characters-long"
      DATABASE_URL: "postgresql://user:pass@localhost/test"
      PYTHONPATH: Nursing_Training_AI_App/backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install core dependencies
      run: |
        cd Nursing_Training_AI_App/backend
        pip install fastapi uvicorn pydantic pydantic-settings sqlalchemy alembic \
          python-jose[cryptography] bcrypt httpx psutil sentry-sdk[fastapi] \
          stripe pyotp cryptography PyJWT email-validator python-multipart \
          aiofiles pypdf tqdm geoip2 dnspython redis celery aiosmtplib \
          strawberry-graphql[fastapi] psycopg2-binary

    - name: Check Python syntax (all files)
      run: |
        cd Nursing_Training_AI_App/backend
        python -c "
        import os, sys
        errors = []
        for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in ('__pycache__', 'venv', '.venv', 'node_modules')]
            for f in files:
                if f.endswith('.py'):
                    path = os.path.join(root, f)
                    try:
                        with open(path, 'r', encoding='utf-8') as fh:
                            compile(fh.read(), path, 'exec')
                    except SyntaxError as e:
                        errors.append(f'{path}: line {e.lineno}: {e.msg}')
        if errors:
            for e in errors:
                print(f'SYNTAX ERROR: {e}')
            sys.exit(1)
        print('All Python files: syntax OK')
        "

    - name: Verify critical imports
      run: |
        cd Nursing_Training_AI_App/backend
        python -c "
        import sys
        sys.path.insert(0, '.')
        from core.config import settings
        print('OK: core.config')
        from core.auth import hash_password, verify_password, create_access_token
        print('OK: core.auth')
        from core.nhs_compliance import NHSPasswordPolicy, get_dtac_compliance_status
        print('OK: core.nhs_compliance')
        from api.dependencies import get_current_user, get_current_admin
        print('OK: api.dependencies')
        from api.schemas.auth import UserRegister, UserLogin, TokenResponse
        print('OK: api.schemas.auth')
        from models.user import User, UserRole, NHSBand
        print('OK: models.user')
        from models.training import Question, TrainingSession
        print('OK: models.training')
        print('All critical imports: OK')
        "

    - name: Verify auth system
      run: |
        cd Nursing_Training_AI_App/backend
        python -c "
        import sys
        sys.path.insert(0, '.')
        from core.auth import hash_password, verify_password, create_access_token, verify_token

        # Test password hashing
        h = hash_password('TestPass123!')
        assert verify_password('TestPass123!', h), 'Hash verify failed'
        assert not verify_password('wrong', h), 'Wrong password should fail'

        # Test JWT
        token = create_access_token({'sub': '1', 'email': 'test@test.com', 'role': 'student'})
        payload = verify_token(token, 'access')
        assert payload and payload['sub'] == '1', 'JWT verify failed'
        assert verify_token(token, 'refresh') is None, 'Type enforcement failed'

        # Test NHS password policy
        from core.nhs_compliance import NHSPasswordPolicy
        assert NHSPasswordPolicy.validate('short') is not None
        assert NHSPasswordPolicy.validate('ValidPass123!') is None
        assert NHSPasswordPolicy.validate('nursing') is not None

        print('Auth system: all tests passed')
        "

    - name: Verify Alembic migration syntax
      run: |
        cd Nursing_Training_AI_App/backend
        python -c "
        exec(open('alembic/versions/001_initial_schema_16_tables.py').read())
        print('Alembic migration: syntax OK')
        "

  # ── Frontend checks ─────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend - TypeScript Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Nursing_Training_AI_App/frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd Nursing_Training_AI_App/frontend
        npm ci

    - name: TypeScript compile check
      run: |
        cd Nursing_Training_AI_App/frontend
        npx tsc --noEmit

  # ── Security check ─────────────────────────────────────────────
  security-scan:
    name: Security - Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check for secrets in code
      run: |
        # Check no .env files are committed
        if find . -name ".env" -not -path "./.git/*" -not -path "*/venv/*" -not -path "*/node_modules/*" | grep -q .; then
          echo "WARNING: .env files found in repository!"
          find . -name ".env" -not -path "./.git/*" -not -path "*/venv/*" -not -path "*/node_modules/*"
          exit 1
        fi
        echo "No .env files in repository: OK"

    - name: Check for hardcoded API keys
      run: |
        # Search for common API key patterns in Python/TS files
        if grep -rn "sk-proj-\|sk-ant-\|AIzaSy" --include="*.py" --include="*.ts" --include="*.tsx" \
          --exclude-dir=node_modules --exclude-dir=venv --exclude-dir=.git . 2>/dev/null; then
          echo "WARNING: Possible hardcoded API keys found!"
          exit 1
        fi
        echo "No hardcoded API keys: OK"

    - name: Frontend dependency audit
      continue-on-error: true
      run: |
        cd Nursing_Training_AI_App/frontend
        npm audit --audit-level=high || true

  # ── Docker build ───────────────────────────────────────────────
  build-docker:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend-syntax, frontend-typecheck]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Backend image
      uses: docker/build-push-action@v6
      with:
        context: ./Nursing_Training_AI_App/backend
        push: false
        tags: nursingai/backend:latest

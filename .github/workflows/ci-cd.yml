name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/Nursing_Training_AI_App/backend
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      DATABASE_URL: "sqlite:///./test.db"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd Nursing_Training_AI_App/backend
        pip install -r requirements.txt
        pip install email-validator pytest flake8 black

    - name: Run tests
      run: |
        cd Nursing_Training_AI_App/backend
        python -m pytest tests/ -v

    - name: Check code quality
      continue-on-error: true
      run: |
        cd Nursing_Training_AI_App/backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./Nursing_Training_AI_App/backend
        push: false
        tags: nursingai/backend:latest

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to production server
      run: |
        echo "Deploying to production..."
        # TODO: Add deployment commands


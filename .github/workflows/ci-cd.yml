name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "ci-test-secret-key-minimum-32-characters-long"
      DATABASE_URL: "sqlite:///./test.db"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PYTHONPATH: Nursing_Training_AI_App/backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd Nursing_Training_AI_App/backend
        pip install -r requirements.txt
        pip install email-validator pytest pytest-asyncio flake8 black

    - name: Run tests
      run: |
        python -m pytest Nursing_Training_AI_App/backend/tests/ -v

    - name: Check code quality
      continue-on-error: true
      run: |
        cd Nursing_Training_AI_App/backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./Nursing_Training_AI_App/backend
        push: false
        tags: nursingai/backend:latest


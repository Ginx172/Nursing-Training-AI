name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        cd Nursing_Training_AI_App/backend
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd Nursing_Training_AI_App/backend
        pytest tests/ -v
    
    - name: Check code quality
      run: |
        cd Nursing_Training_AI_App/backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .

  test-mobile:
    name: Test Mobile App
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd Nursing_Training_AI_App/mobile
        npm ci
    
    - name: Run tests
      run: |
        cd Nursing_Training_AI_App/mobile
        npm test -- --watchAll=false

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-mobile]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./Nursing_Training_AI_App/backend
        push: true
        tags: nursingai/backend:latest
    
    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./Nursing_Training_AI_App/frontend
        push: true
        tags: nursingai/frontend:latest

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production server
      run: |
        echo "Deploying to production..."
